name: Deploy Frontend

on:
  push:
    branches:
      - main
      - devserver

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      #################################################
      # DEV SERVER DEPLOYMENT
      #################################################

      - name: Deploy Dev Server
        if: github.ref == 'refs/heads/devserver'
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << 'EOF'

          set -e

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd /home/administrator/apps/students/dev_server/SL-Test-App

          git fetch origin devserver
          git reset --hard origin/devserver
          git clean -fd

          rm -rf .next

          npm install
          npm run build

          pm2 restart students_dev_server

          pm2 save

          EOF

      #################################################
      # PRODUCTION DEPLOYMENT
      #################################################

      - name: Deploy Production
        if: github.ref == 'refs/heads/main'
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << 'EOF'

          set -e

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd /home/administrator/apps/students/prod_server/SL-Test-App

          git fetch origin main
          git reset --hard origin/main
          git clean -fd

          rm -rf .next

          npm install
          npm run build

          pm2 restart skyliteeducations-prod

          pm2 save

          EOF